<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéDex Dinámica</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <header>
        <header>
        <button id="btn-musica" class="btn-musica" style="display: none;">🔊 Música ON</button>
        <audio id="musica-fondo" loop>
            <source src="https://play.pokemonshowdown.com/audio/rby-wildpokemon.mp3" type="audio/mpeg">
        </audio>
        <h1>PokéDex Dinámica</h1>
        
        <div class="panel-control">
            <div class="grupo-filtro">
                <button id="btn-favoritos" class="btn-favoritos-nav">🤍 Ver Favoritos</button>
                <label for="buscar">Buscar:</label>
                <input id="buscar" type="text" placeholder="Por nombre...">
            </div>

            <div class="grupo-filtro">
                <label for="filtro-tipo">Tipo:</label>
                <select id="filtro-tipo">
                    <option value="todos">Todos los tipos</option>
                    <option value="fire">Fuego</option>
                    <option value="water">Agua</option>
                    <option value="grass">Planta</option>
                    <option value="bug">Bicho</option>
                    <option value="electric">Eléctrico</option>
                    <option value="poison">Veneno</option>
                    <option value="normal">Normal</option>
                </select>
            </div>

            <div class="grupo-filtro">
                <label for="filtro-region">Región:</label>
                <select id="filtro-region">
                    <option value="todas">Todas las regiones</option>
                    <option value="kanto">Kanto (Gen 1)</option>
                    <option value="johto">Johto (Gen 2)</option>
                    <option value="hoenn">Hoenn (Gen 3)</option>
                    <option value="sinnoh">Sinnoh (Gen 4)</option>
                    <option value="unova">Unova (Gen 5)</option>
                    <option value="kalos">Kalos (Gen 6)</option>
                    <option value="alola">Alola (Gen 7)</option>
                    <option value="galar">Galar (Gen 8)</option>
                    <option value="paldea">Paldea (Gen 9)</option>
                </select>
            </div>
        </div>
    </header>

    <main>
        <button id="cargar">Cargar Datos</button>
        
        <section id="galeria">
            <div id="bienvenida">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" alt="Pikachu de bienvenida">
                <div class="letrero">
                    <p>¡Bienvenido maestro Pokémon!</p>
                    <span>Presiona el botón "Cargar Datos" arriba para activar la PokéDex.</span>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-pokemon" class="modal-oculto">
        <div class="modal-contenido">
            <span id="cerrar-modal">&times;</span>
            <div id="info-pokemon">
                </div>
        </div>
    </div>

    <footer>
        <p>Desafío Front End - Unidad 1</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
